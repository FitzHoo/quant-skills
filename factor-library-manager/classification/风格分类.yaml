# 因子风格分类体系
# 用于统一因子分类标签

categories:
  - name: "情绪"
    description: "反映投资者情绪和行为偏好"
    examples:
      - "股东户数变动"
      - "机构持股变动"
      - "北向资金净流入"
      - "融资融券余额"
      - "换手率"
    keywords:
      - "情绪"
      - "行为"
      - "偏好"
      - "关注度"

  - name: "价值"
    description: "基于估值和财务质量"
    examples:
      - "市盈率PE"
      - "市净率PB"
      - "股息率"
      - "自由现金流收益率"
      - "EP"
    keywords:
      - "价值"
      - "估值"
      - "便宜"

  - name: "动量"
    description: "基于价格走势和趋势"
    examples:
      - "过去N月收益率"
      - "动量反转"
      - "均线突破"
      - "RSI"
      - "MACD"
    keywords:
      - "动量"
      - "趋势"
      - "反转"
      - "突破"

  - name: "质量"
    description: "反映公司盈利能力和稳定性"
    examples:
      - "ROE稳定性"
      - "ROA"
      - "毛利率稳定性"
      - "盈利质量"
      - "现金流质量"
    keywords:
      - "质量"
      - "盈利"
      - "稳定"
      - "优质"

  - name: "成长"
    description: "基于公司成长性指标"
    examples:
      - "收入增长率"
      - "净利润增长率"
      - "PEG"
      - "营收增速"
    keywords:
      - "成长"
      - "增长"
      - "扩张"

  - name: "技术"
    description: "基于技术指标和形态"
    examples:
      - "均线收敛发散"
      - "形态识别"
      - "突破信号"
    keywords:
      - "技术"
      - "形态"
      - "信号"

mapping_rules:
  - "根据研报中因子逻辑描述确定风格分类"
  - "多个风格叠加时选择主风格"
  - "无法确定时选择'其他'分类"